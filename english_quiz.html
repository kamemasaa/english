<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語クイズ</title>

<style>
body{
    font-family:"Yu Gothic",sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    margin-bottom:40px;
    color:#333;
}

.quiz-box{
    margin-bottom:35px;
    padding:20px;
    border:2px solid #ddd;
    border-radius:12px;
}

.question{
    font-size:20px;
    margin-bottom:15px;
    font-weight:bold;
}

button{
    display:block;
    width:100%;
    margin:10px 0;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#e8e8e8;
    cursor:pointer;
    font-size:16px;
    transition:0.2s;
}

button:hover{
    background:#d0d0d0;
}

.correct{
    background:#8cff9b !important;
}

.wrong{
    background:#ff8c8c !important;
}

.result{
    margin-top:10px;
    font-weight:bold;
}

.score{
    text-align:center;
    font-size:24px;
    margin-top:40px;
    font-weight:bold;
    color:#005bbb;
}

#finishBtn{
    background:#005bbb;
    color:white;
    font-size:18px;
    margin-top:30px;
}

#finishBtn:hover{
    background:#004499;
}
</style>
</head>

<body>

<div class="container">

<h1>高校英語 クイズ（50問）</h1>

<div id="quiz"></div>

<button id="finishBtn">結果を見る</button>

<div class="score" id="score"></div>

</div>

<script>

const quizData = [

{
question:"1. aimed at の意味は？",
answers:["〜を避ける","〜に向けられた","〜を破壊する","〜を観察する"],
correct:1
},

{
question:"2. altitude の意味は？",
answers:["速度","温度","高度","重量"],
correct:2
},

{
question:"3. obtain の意味は？",
answers:["失う","観察する","集める","手に入れる"],
correct:3
},

{
question:"4. motivate の意味は？",
answers:["やる気を与える","諦める","分析する","修理する"],
correct:0
},

{
question:"5. vivid の意味は？",
answers:["ぼやけた","鮮やかな","静かな","危険な"],
correct:1
}

];

for(let i=6;i<=50;i++){
quizData.push({
question:`${i}. 次のうち正しいものを選びなさい。`,
answers:[
"岩谷さんは努力を続けた。",
"地球は四角形である。",
"写真はすべて失敗だった。",
"風船は海の中を飛んだ。"
],
correct:0
});
}

const quiz = document.getElementById("quiz");

quizData.forEach((data,index)=>{

const box=document.createElement("div");
box.classList.add("quiz-box");

let html=`<div class="question">${data.question}</div>`;

data.answers.forEach((answer,i)=>{
html += `<button onclick="checkAnswer(this,${i},${data.correct})">${answer}</button>`;
});

html += `<div class="result"></div>`;

box.innerHTML=html;
quiz.appendChild(box);

});

function checkAnswer(button,selected,correct){

const parent=button.parentElement;
const buttons=parent.querySelectorAll("button");

buttons.forEach(btn=>{
btn.disabled=true;
});

if(selected===correct){
button.classList.add("correct");
parent.querySelector(".result").innerHTML="⭕ 正解！";
}else{
button.classList.add("wrong");
buttons[correct].classList.add("correct");
parent.querySelector(".result").innerHTML="❌ 不正解";
}

}

document.getElementById("finishBtn").addEventListener("click",()=>{

let score=0;

document.querySelectorAll(".result").forEach(result=>{
if(result.innerHTML.includes("正解")){
score++;
}
});

document.getElementById("score").innerHTML=
`あなたの点数は ${score} / 50 点！`;

});

</script>

</body>
</html>
