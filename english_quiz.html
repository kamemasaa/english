<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高校英語 長文読解クイズ</title>

<style>
body{
    font-family:"Yu Gothic",sans-serif;
    background:#f3f3f3;
    margin:0;
    padding:30px;
    line-height:1.8;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#222;
    margin-bottom:40px;
}

.quiz-box{
    border:2px solid #ddd;
    border-radius:12px;
    padding:25px;
    margin-bottom:30px;
}

.question{
    font-size:20px;
    font-weight:bold;
    margin-bottom:20px;
}

.quote{
    background:#f5f5f5;
    padding:15px;
    border-left:5px solid #005bbb;
    margin-bottom:20px;
    font-style:italic;
}

button{
    display:block;
    width:100%;
    margin:10px 0;
    padding:14px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    background:#e7e7e7;
    transition:0.2s;
}

button:hover{
    background:#d5d5d5;
}

.correct{
    background:#98ff9e !important;
}

.wrong{
    background:#ff9898 !important;
}

.result{
    margin-top:10px;
    font-weight:bold;
    font-size:18px;
}

#finishBtn{
    width:100%;
    padding:18px;
    background:#005bbb;
    color:white;
    border:none;
    border-radius:10px;
    font-size:20px;
    cursor:pointer;
}

.score{
    text-align:center;
    margin-top:35px;
    font-size:28px;
    font-weight:bold;
    color:#005bbb;
}
</style>
</head>
<body>

<div class="container">

<h1>高校英語 長文読解クイズ</h1>

<div id="quiz"></div>

<button id="finishBtn">結果を見る</button>
<div class="score" id="score"></div>

</div>

<script>

const quizData = [

{
quote:"The earth shines in the sun. Its background is pitch-black darkness.",
question:"1. 『Its background is pitch-black darkness.』とはどういうことか。",
answers:[
"地球の周りが宇宙の暗闇だから",
"夜だったから",
"カメラが壊れていたから",
"地球が消えていたから"
],
correct:0
},

{
quote:"Using a parachute, the camera slowly falls back down to land.",
question:"2. カメラがゆっくり落下した理由として最も適切なものはどれか。",
answers:[
"より高く飛ぶため",
"カメラを壊さないため",
"写真を暗くするため",
"風を強く受けるため"
],
correct:1
},

{
quote:"He used materials obtained at a local home improvement store.",
question:"3. この文から分かることとして最も適切なものはどれか。",
answers:[
"特別な研究施設を利用した",
"海外から高価な機械を輸入した",
"身近な材料を工夫して利用した",
"大学だけで研究を行った"
],
correct:2
},

{
quote:"They had not needed much money or any advanced technology.",
question:"4. 岩谷さんが驚いた理由として最も適切なものはどれか。",
answers:[
"宇宙写真には莫大な費用が必要だと思っていたから",
"学生が写真を嫌っていたから",
"大学生が失敗したから",
"技術が全く不要だったから"
],
correct:0
},

{
quote:"On his 11th attempt, he was finally able to take photographs from space.",
question:"5. この文から読み取れる岩谷さんの人物像として最も適切なものはどれか。",
answers:[
"すぐに諦める人",
"失敗を繰り返しても挑戦を続ける人",
"他人に頼る人",
"計画を立てない人"
],
correct:1
},

{
quote:"The pictures were too blurry.",
question:"6. 『too blurry』の意味として最も適切なものはどれか。",
answers:[
"鮮明すぎる",
"小さすぎる",
"ぼやけすぎている",
"色が暗すぎる"
],
correct:2
},

{
quote:"When he saw it, he felt a pure delight.",
question:"7. 岩谷さんは写真を見たとき、どのような気持ちになったか。",
answers:[
"純粋な喜びを感じた",
"強い怒りを感じた",
"不安を感じた",
"失望した"
],
correct:0
},

{
quote:"Since then, he has been motivated by this experience.",
question:"8. 『this experience』が指す内容として最も適切なものはどれか。",
answers:[
"映画を見た経験",
"大学に入学した経験",
"宇宙から地球を撮影した経験",
"ロケットに乗った経験"
],
correct:2
},

{
quote:"People often imagine invention as something that needs to be done on a large scale.",
question:"9. この文の内容として最も適切なものはどれか。",
answers:[
"人々は発明には大規模な設備が必要だと思いがちである",
"発明は小規模では不可能である",
"発明には必ず企業が必要である",
"発明は個人ではできない"
],
correct:0
},

{
quote:"But new discoveries were made with every launch.",
question:"10. この文が表していることとして最も適切なものはどれか。",
answers:[
"毎回完全に失敗だった",
"挑戦のたびに新しい発見があった",
"打ち上げ回数が減った",
"研究を中止した"
],
correct:1
}
];

quizData.push(
{
quote:"He collected data and made improvements.",
question:"11. この文から分かることとして最も適切なものはどれか。",
answers:["彼は失敗後に工夫を重ねた","彼は研究を諦めた","彼はデータを捨てた","彼は一度も改善しなかった"],
correct:0
},
{
quote:"People around him laughed at his idea.",
question:"12. この文から読み取れることはどれか。",
answers:["周囲の人は彼を応援していた","周囲の人は彼の考えを疑っていた","周囲の人は無関心だった","周囲の人は研究に参加した"],
correct:1
},
{
quote:"He aimed the camera at the earth.",
question:"13. 『aimed the camera at the earth』の意味として適切なものはどれか。",
answers:["カメラを地球に向けた","地球を破壊した","カメラを捨てた","地球を離れた"],
correct:0
},
{
quote:"The balloon burst at a high altitude.",
question:"14. 風船はいつ破裂したか。",
answers:["地上にいる時","高高度に達した時","海の中に入った時","夜になった時"],
correct:1
},
{
quote:"The earth looked beautiful from space.",
question:"15. この文から読み取れる岩谷さんの気持ちはどれか。",
answers:["感動","怒り","退屈","恐怖"],
correct:0
}
);

const additionalQuestions = [
"16. この文から分かることとして最も適切なものはどれか。",
"17. 岩谷さんが挑戦を続けた理由として最も適切なものはどれか。",
"18. 『advanced technology』が必要なかったことの意味として最も適切なものはどれか。",
"19. 本文の内容として正しいものはどれか。",
"20. 『pure delight』に最も近い意味はどれか。",
"21. 岩谷さんは失敗後に何をしたか。",
"22. パラシュートの役割として最も適切なものはどれか。",
"23. 『continuous rethinking』が必要な理由はどれか。",
"24. 本文から分かる岩谷さんの性格はどれか。",
"25. 『homemade space camera』の特徴として適切なものはどれか。",
"26. 本文の主題として最も適切なものはどれか。",
"27. 『He was amazed』とあるが、なぜか。",
"28. 『new discoveries were made』とはどういうことか。",
"29. 『motivated by this experience』の意味として適切なものはどれか。",
"30. この文章で筆者が伝えたい教訓はどれか。",
"31. 岩谷さんが工夫した点として適切なものはどれか。",
"32. 本文中の『launch』の意味として適切なものはどれか。",
"33. 『The earth shines in the sun.』から分かることはどれか。",
"34. 『blurry pictures』になった原因として適切なものはどれか。",
"35. 本文から読み取れる宇宙写真撮影の難しさはどれか。",
"36. 『give up』しないことが重要な理由はどれか。",
"37. 本文で繰り返し述べられていることはどれか。",
"38. 岩谷さんは何によってやる気を得たか。",
"39. 『endeavors are likely to continue』の意味として適切なものはどれか。",
"40. 本文から分かることとして最も適切なものはどれか。",
"41. 『large scale』が意味するものはどれか。",
"42. 筆者は発明についてどのように考えているか。",
"43. 岩谷さんの成功の要因として適切なものはどれか。",
"44. 『Using things around him』とはどういう意味か。",
"45. 本文全体を通して最も強調されていることはどれか。",
"46. この文章のタイトルとして最も適切なものはどれか。",
"47. 本文から読み取れる『challenge』の意味はどれか。",
"48. 岩谷さんはなぜデータを集めたのか。",
"49. 『dreams are achievable』が表す考えはどれか。",
"50. 本文を通して最も適切な感想はどれか。"
];

for(let i=0;i<additionalQuestions.length;i++){
quizData.push({
quote:"Success requires continuous rethinking.",
question:additionalQuestions[i],
answers:[
"挑戦と工夫を続けることの大切さ",
"夢は実現できないということ",
"失敗したら諦めるべきということ",
"特別な才能だけが重要だということ"
],
correct:0
});
}

}

const quiz = document.getElementById("quiz");

quizData.forEach((data,index)=>{

const box = document.createElement("div");
box.classList.add("quiz-box");

let html = `
<div class="quote">${data.quote}</div>
<div class="question">${data.question}</div>
`;

for(let i=0;i<data.answers.length;i++){
html += `<button onclick="checkAnswer(this,${i},${data.correct})">${data.answers[i]}</button>`;
}

html += `<div class="result"></div>`;

box.innerHTML = html;
quiz.appendChild(box);

});

function checkAnswer(button,selected,correct){

const parent = button.parentElement;
const buttons = parent.querySelectorAll("button");

buttons.forEach(btn=>{
btn.disabled = true;
});

if(selected === correct){
button.classList.add("correct");
parent.querySelector(".result").innerHTML = "⭕ 正解！";
}else{
button.classList.add("wrong");
buttons[correct].classList.add("correct");
parent.querySelector(".result").innerHTML = "❌ 不正解";
}
}

document.getElementById("finishBtn").addEventListener("click",()=>{

let score = 0;

const results = document.querySelectorAll(".result");

results.forEach(r=>{
if(r.innerHTML.includes("⭕ 正解！")){
score++;
}
});

document.getElementById("score").innerHTML = `あなたの点数は ${score} / 50 点！`;

});

</script>

</body>
</html>
